name: Daily Housing Announcement Alert

on:
  schedule:
    # 매일 아침 한국 시간(KST) 오전 8시 18분에 실행 (UTC 기준 전날 23:18)
    - cron: '18 23 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check MyHome connectivity
        run: |
          set -e
          for i in 1 2 3; do
            echo "[connectivity] myhome.go.kr check attempt $i/3"
            if curl -sS -I --max-time 25 "https://www.myhome.go.kr/hws/portal/sch/selectRsdtRcritNtcView.do" >/dev/null; then
              echo "[connectivity] reachable"
              exit 0
            fi
            sleep $((i * 15))
          done
          echo "[connectivity] unreachable after retries"
          exit 1

      - name: Run Alert Service
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MYHOME_BASE_URL: ${{ vars.MYHOME_BASE_URL || 'https://www.myhome.go.kr' }}
          MYHOME_PROXY_URL: ${{ secrets.MYHOME_PROXY_URL }}
          MYHOME_CONNECT_TIMEOUT: "20"
          MYHOME_READ_TIMEOUT: "40"
          MYHOME_MAX_RETRIES: "5"
          MYHOME_PAGE_RETRY_ATTEMPTS: "5"
          MYHOME_RETRY_BACKOFF_SECONDS: "2.0"
        run: |
          set -e
          for i in 1 2 3; do
            echo "[run] python main.py attempt $i/3"
            if python main.py; then
              exit 0
            fi
            sleep $((i * 30))
          done
          exit 1
