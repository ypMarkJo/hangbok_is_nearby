name: Daily Housing Announcement Alert

on:
  schedule:
    # 매일 아침 한국 시간(KST) 오전 8시 30분에 실행 (UTC 기준 전날 23:30)
    - cron: '30 23 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Network probe (myhome)
        run: |
          set -x
          date
          nslookup www.myhome.go.kr || true
          curl -vI --connect-timeout 10 --max-time 30 \
            https://www.myhome.go.kr/hws/portal/sch/selectRsdtRcritNtcView.do || true
          curl -v --connect-timeout 10 --max-time 30 \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://www.myhome.go.kr/hws/portal/sch/selectRsdtRcritNtcView.do" \
            -H "Content-Type: application/x-www-form-urlencoded; charset=UTF-8" \
            -H "X-Requested-With: XMLHttpRequest" \
            --data "pageIndex=1&searchTyId=&srchSuplyTy=&srchHouseTy=&srchSuplyPrvuseAr=&srchBassMtRntchrg=&srchPrgrStts=1&lfstsTyAt=&srchPblancNm=&srchRcritPblancDeYearMtBegin=&srchRcritPblancDeYearMtEnd=" \
            https://www.myhome.go.kr/hws/portal/sch/selectRsdtRcritNtcList.do || true

      - name: Run Alert Service
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
