name: Daily Housing Announcement Alert

on:
  schedule:
    # 매일 아침 한국 시간(KST) 오전 8시 18분에 실행 (UTC 기준 전날 23:18)
    - cron: '18 23 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alert Service
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MYHOME_RELAY_URL: ${{ secrets.MYHOME_RELAY_URL }}
          MYHOME_RELAY_KEY: ${{ secrets.MYHOME_RELAY_KEY }}
        run: |
          python main.py
